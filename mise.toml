#:schema https://mise.jdx.dev/schema/mise.json
#:tombi lint.disabled = true

[tools]
"core:node" = "26"

"aqua:cargo-bins/cargo-binstall" = "latest"
"github:endevco/aube" = "1"
"cargo:uv" = "0.11"

"cargo:committed" = "1"
"cargo:prek" = "0.4"
"cargo:typos-cli" = "1"
"npm:wrangler" = "4"
"pipx:yamlfix" = "1.19.1"

[tasks.format]
description = "Check formatting (biome, tombi, yamlfix)"
run = [
  "biome format .",
  "tombi format --check .",
  "yamlfix -c {{cwd}}/.yamlfix.toml --exclude '**/aube-lock.yaml' --check .",
]

[tasks."format:fix"]
description = "Apply formatting fixes (biome, tombi, yamlfix)"
run = [
  "biome format --write .",
  "tombi format .",
  "yamlfix -c {{cwd}}/.yamlfix.toml --exclude '**/aube-lock.yaml' .",
]

[tasks.lint]
description = "Lint sources (biome, tombi)"
run = [
  "biome lint .",
  "tombi lint .",
]

[tasks."lint:fix"]
description = "Apply lint fixes (biome)"
run = [
  "biome lint --write .",
]

[tasks.check]
description = "Run format and lint checks"
run = { tasks = ["format", "lint"] }

[tasks."check:fix"]
description = "Apply all format and lint fixes"
run = [
  { task = "format:fix" },
  { task = "lint:fix" },
]

[tasks.typecheck]
description = "Type-check the project (astro check)"
run = "aubr check"

[tasks."test:unit"]
description = "Run unit tests (vitest)"
run = "aubr test"

[tasks.test]
description = "Run unit tests (vitest) and end-to-end tests (Playwright)"
depends = ["test:unit", "e2e:test"]

[tasks.build]
description = "Build release artifacts for Cloudflare Workers deployment"
run = "aubr build"

[tasks.dev]
description = "Start the Astro dev server with hot reload"
run = "aubr dev"

[tasks.preview]
description = "Build and serve the production worker locally (wrangler dev)"
depends = ["build"]
run = "aubx wrangler dev --config dist/server/wrangler.json"

[tasks."data:update"]
description = "Refresh the GitHub fallback JSON from the live API"
run = "aubx tsx scripts/update-fallback-data.ts"

[tasks."oss-contribs:update"]
description = "Regenerate the OSS contributions list from the live API"
run = "aubx tsx scripts/update-oss-contribs.ts"

[tasks."e2e:install"]
description = "Install e2e deps and Playwright browsers (Chromium in CI, full matrix locally)"
dir = "e2e"
run = [
  "aube install --frozen-lockfile",
  """
  if [ -n "$CI" ]; then
    aubx playwright install --with-deps chromium
  else
    aubx playwright install chromium firefox webkit
  fi
  """,
]

[tasks."e2e:test"]
description = "Run the Playwright end-to-end suite"
dir = "e2e"
depends = ["e2e:install"]
run = "aubx playwright test"

[tasks.deploy]
description = "Deploy to Cloudflare Workers (requires wrangler auth)"
depends = ["build"]
run = "aubx wrangler deploy --config dist/server/wrangler.json"
