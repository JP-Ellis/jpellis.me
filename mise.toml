#:schema https://mise.jdx.dev/schema/mise.json
#:tombi lint.disabled = true

[tools]
"core:node" = "24"
"core:rust" = {
  version = "stable",
  components = ["rustfmt", "clippy", "llvm-tools"],
  targets = ["wasm32-unknown-unknown"],
}

"aqua:cargo-bins/cargo-binstall" = "latest"
"github:endevco/aube" = "1"
"cargo:uv" = "0.11"

"cargo:cargo-leptos" = "0.3"
"cargo:worker-build" = "0.8"
"cargo:cargo-llvm-cov" = "0.8"
"cargo:cargo-machete" = "0.9"
"cargo:cargo-nextest" = "0.9"
"cargo:committed" = "1"
"cargo:leptosfmt" = "0.1"
"cargo:prek" = "0.3"
"cargo:stylance-cli" = "0.8"
"cargo:typos-cli" = "1"
"npm:wrangler" = "4"
"pipx:yamlfix" = "1"

[tasks.format]
run = [
  "cargo +nightly fmt --check",
  "leptosfmt --check src/",
  "biome format .",
  "tombi format --check .",
  "yamlfix -c {{cwd}}/.yamlfix.toml --check .",
]

[tasks."format:fix"]
run = [
  "cargo +nightly fmt",
  "leptosfmt src/",
  "biome format --write .",
  "tombi format .",
  "yamlfix -c {{cwd}}/.yamlfix.toml .",
]

[tasks.lint]
run = [
  "cargo clippy --all-targets --",
  "biome lint .",
  "tombi lint .",
]

[tasks."lint:fix"]
run = [
  "cargo clippy --all-targets --fix --",
  "biome lint --write .",
]

[tasks.check]
run = { tasks = ["format", "lint"] }

[tasks."check:fix"]
run = [
  { task = "format:fix" },
  { task = "lint:fix" },
]

[tasks.test]
depends = ["test:nextest", "e2e:test"]

[tasks."test:nextest"]
run = "cargo nextest run"

[tasks.coverage]
run = "cargo llvm-cov nextest"

[tasks.machete]
run = "cargo machete"

[tasks.watch]
run = '''
#!/usr/bin/env bash
stylance --watch . &
STYLANCE_PID=$!
cargo leptos watch &
CARGO_PID=$!

trap "kill $STYLANCE_PID $CARGO_PID 2>/dev/null; exit" INT TERM

wait
'''

[tasks."watch:wrangler"]
depends = ["build"]
run = "wrangler dev"

[tasks.build]
description = "Build release artifacts for Cloudflare Workers deployment"
run = "cargo leptos build --release && worker-build --release --features ssr"
sources = [
  "Cargo.toml",
  "Cargo.lock",
  "build.rs",
  "src/**/*.rs",
  "style/**/*.scss",
  "public/**/*",
  "content/**/*",
  "wrangler.toml",
]
outputs = ["target/site/**/*", "build/**/*"]

[tasks."e2e:install"]
dir = "e2e"
run = "aube install"

[tasks."e2e:test"]
dir = "e2e"
depends = ["e2e:install"]
run = "aube exec playwright test"

[tasks.deploy]
description = "Deploy to Cloudflare Workers (requires wrangler auth)"
depends = ["build"]
run = "wrangler deploy"
