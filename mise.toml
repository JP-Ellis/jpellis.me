#:schema https://mise.jdx.dev/schema/mise.json
#:tombi lint.disabled = true

[tools]
"core:node" = "24"
"core:rust" = {
  version = "1.96",
  components = ["rustfmt", "clippy", "llvm-tools"],
  targets = ["wasm32-unknown-unknown"],
}

"aqua:cargo-bins/cargo-binstall" = "latest"
"github:endevco/aube" = "1"
"cargo:uv" = "0.11"

"cargo:cargo-leptos" = "0.3"
"cargo:worker-build" = "0.8"
"cargo:cargo-llvm-cov" = "0.8"
"cargo:cargo-machete" = "0.9"
"cargo:cargo-nextest" = "0.9"
"cargo:committed" = "1"
"cargo:leptosfmt" = "0.1"
"cargo:prek" = "0.4"
"cargo:stylance-cli" = "0.8"
"cargo:typos-cli" = "1"
"npm:wrangler" = "4"
"pipx:yamlfix" = "1"

[tasks.format]
run = [
  "cargo +nightly fmt --check",
  "leptosfmt --check src/",
  "biome format .",
  "tombi format --check .",
  "yamlfix -c {{cwd}}/.yamlfix.toml --check .",
]

[tasks."format:fix"]
run = [
  "cargo +nightly fmt",
  "leptosfmt src/",
  "biome format --write .",
  "tombi format .",
  "yamlfix -c {{cwd}}/.yamlfix.toml .",
]

[tasks.lint]
run = [
  "cargo clippy --all-targets --features ssr",
  "cargo clippy --all-targets --target wasm32-unknown-unknown --features hydrate",
  "cargo clippy --all-targets --target wasm32-unknown-unknown --features ssr",
  "biome lint .",
  "tombi lint .",
]

[tasks."lint:fix"]
run = [
  "cargo clippy --all-targets --features ssr --fix",
  "cargo clippy --all-targets --target wasm32-unknown-unknown --features hydrate --fix",
  "cargo clippy --all-targets --target wasm32-unknown-unknown --features ssr --fix",
  "biome lint --write .",
]

[tasks.check]
run = { tasks = ["format", "lint"] }

[tasks."check:fix"]
run = [
  { task = "format:fix" },
  { task = "lint:fix" },
]

[tasks.test]
depends = ["test:nextest", "e2e:test"]

[tasks."test:nextest"]
run = "cargo nextest run --features ssr"

[tasks.coverage]
run = "cargo llvm-cov nextest --features ssr"

[tasks.machete]
run = "cargo machete"

[tasks.favicons]
description = "Generate favicon variants from public/favicon.png"
run = "./scripts/generate-favicons.rs"
sources = ["scripts/generate-favicons.rs", "public/favicon.png"]
outputs = [
  "public/favicon.ico",
  "public/favicon-16x16.png",
  "public/favicon-32x32.png",
  "public/apple-touch-icon.png",
  "public/android-chrome-192x192.png",
  "public/android-chrome-512x512.png",
  "public/mstile-150x150.png",
]

[tasks.stylance]
description = "Generate scoped CSS module files from *.module.scss sources"
run = "stylance ."
sources = ["src/**/*.module.scss"]
outputs = ["style/stylance/_index.scss"]

[tasks."rust:wasm-target"]
description = "Ensure wasm32-unknown-unknown target is installed"
run = "rustup target add wasm32-unknown-unknown"

[tasks.build]
description = "Build release artifacts for Cloudflare Workers deployment"
depends = ["rust:wasm-target", "favicons", "stylance"]
# LEPTOS_OUTPUT_NAME tells HydrationScripts to reference `{name}.wasm` rather than `{name}_bg.wasm`.
# cargo-leptos sets this automatically for its own sub-builds and renames the WASM accordingly,
# but worker-build runs a separate cargo invocation that does not inherit it — so the SSR binary
# would otherwise embed the wrong filename in the generated HTML.
env = { LEPTOS_OUTPUT_NAME = "jpellis-me" }
run = "cargo leptos build --release && worker-build --release --features ssr"
sources = [
  "Cargo.toml",
  "Cargo.lock",
  "build.rs",
  "src/**/*.rs",
  "style/**/*.scss",
  "public/**/*",
  "content/**/*",
  "wrangler.toml",
]
outputs = ["target/site/**/*", "build/**/*"]

[tasks.watch]
description = "Start the dev server; wrangler re-runs `mise run build` on source changes"
depends = ["build"]
run = "wrangler dev"

[tasks."e2e:install"]
dir = "e2e"
run = ["aube install", "aube exec playwright install --with-deps chromium"]

[tasks."e2e:test"]
dir = "e2e"
depends = ["e2e:install"]
run = "aube exec playwright test"

[tasks.deploy]
description = "Deploy to Cloudflare Workers (requires wrangler auth)"
depends = ["build"]
run = "wrangler deploy"
