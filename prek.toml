default_install_hook_types = [
  "commit-msg",
  "pre-commit",
  "pre-push",
]
default_stages = ["pre-commit"]

exclude = """
(?x)^(
  .*/snapshots/.*\\.snap
)$
"""

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-added-large-files" },
  { id = "check-case-conflict" },
  { id = "check-shebang-scripts-are-executable", exclude = "\\.rs$" },
  { id = "check-symlinks" },
  { id = "check-toml" },
  { id = "check-xml" },
  { id = "check-yaml" },
  { id = "destroyed-symlinks" },
  { id = "end-of-file-fixer" },
  { id = "mixed-line-ending" },
  { id = "trailing-whitespace" },
]

[[repos]]
repo = "https://github.com/lyz-code/yamlfix"
rev = "1.19.1"
hooks = [
  { id = "yamlfix", args = ["--config-file=.yamlfix.toml"] },
]

[[repos]]
repo = "https://github.com/biomejs/pre-commit"
rev = "v2.4.12"
hooks = [
  { id = "biome-check" },
]

[[repos]]
repo = "https://github.com/tombi-toml/tombi-pre-commit"
rev = "v0.9.22"
hooks = [
  { id = "tombi-format" },
  { id = "tombi-lint" },
]

[[repos]]
repo = "https://github.com/rvben/rumdl-pre-commit"
rev = "v0.1.82"
hooks = [
  { id = "rumdl" },
  { id = "rumdl-fmt" },
]

[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "v1.45.1"
hooks = [
  { id = "typos" },
]

[[repos]]
repo = "https://github.com/shellcheck-py/shellcheck-py"
rev = "v0.10.0.1"
hooks = [
  { id = "shellcheck", args = ["--external-sources"] },
]

[[repos]]
repo = "https://github.com/scop/pre-commit-shfmt"
rev = "v3.11.0-1"
hooks = [
  { id = "shfmt" },
]

[[repos]]
repo = "https://github.com/crate-ci/committed"
rev = "v1.1.11"
hooks = [
  { id = "committed" },
]

[[repos]]
repo = "local"

  [[repos.hooks]]
  id = "cargo-fmt"
  name = "cargo fmt + leptosfmt"
  entry = "mise run format:fix"
  language = "system"
  types = ["rust"]
  pass_filenames = false

  [[repos.hooks]]
  id = "cargo-clippy"
  name = "cargo clippy"
  entry = "mise run lint"
  language = "system"
  types = ["rust"]
  pass_filenames = false

  [[repos.hooks]]
  id = "cargo-machete"
  name = "cargo machete"
  entry = "mise run machete"
  language = "system"
  types = ["rust"]
  pass_filenames = false
  stages = ["pre-push"]
