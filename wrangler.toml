#:schema https://json.schemastore.org/wranglerv3.json

name = "jpellis-me"
main = "build/index.js"
compatibility_date = "2026-04-26"
compatibility_flags = ["nodejs_compat"]

[build]
command = "cargo leptos build --release && worker-build --release --features ssr"

[assets]
directory = "./target/site"

[triggers]
crons = ["0 13 * * *", "0 13 * * 1"]

# KV namespace for caching GitHub stats
# TODO: Replace placeholder IDs with actual namespace IDs
# Run: wrangler kv namespace create GITHUB_STATS
# Run: wrangler kv namespace create GITHUB_STATS --preview
[[kv_namespaces]]
binding = "GITHUB_STATS"
# Run: wrangler kv namespace create GITHUB_STATS
id = ""
# Run: wrangler kv namespace create GITHUB_STATS --preview
preview_id = ""

[[kv_namespaces]]
binding = "WORK_STATS"
# Run: wrangler kv namespace create WORK_STATS
id = ""
# Run: wrangler kv namespace create WORK_STATS --preview
preview_id = ""

# Secret: run `wrangler secret put GITHUB_TOKEN` to set the GitHub PAT
