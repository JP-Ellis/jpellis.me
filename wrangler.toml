#:schema https://www.unpkg.com/wrangler/config-schema.json

name = "jpellis-me"
compatibility_date = "2026-05-26"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist/client"
binding = "ASSETS"

[observability.logs]
enabled = true
invocation_logs = true

[[kv_namespaces]]
binding = "GITHUB_STATS"
id = "5e502e4bfb6b4f6985fcde597f6460e7"
preview_id = "4a22aeeb45134546ae5766655297f396"

[[kv_namespaces]]
binding = "PROJECTS_STATS"
id = "a56dd2a711c746e8890f9bb9662131d6"
preview_id = "54f30bfa5bb44a33868229e83fd7b55b"

# Secret: run `wrangler secret put GITHUB_TOKEN` to set the GitHub PAT
