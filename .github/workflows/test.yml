---
name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  completion:
    name: Test completion check
    runs-on: ubuntu-latest
    needs:
      - prek
      - clippy
      - format
      - machete
      - test
    if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
    steps:
      - run: exit 1

  committed:
    name: Committed
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - uses: crate-ci/committed@faeed42f2e10c244533a01525f13c4d8b6ce383f  # v1.1.11

  prek:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
      - name: Cache prek environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/prek
          key: prek-${{ hashFiles('prek.toml') }}
      - name: Run hooks (skip Rust — covered by dedicated jobs)
        env:
          SKIP: cargo-fmt,cargo-clippy,cargo-machete
        run: prek run -a

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
        with:
          components: clippy
          target: wasm32-unknown-unknown
      - name: Clippy (native + SSR)
        run: cargo clippy --all-targets --features ssr
      - name: Clippy (WebAssembly + hydrate)
        run: cargo clippy --all-targets --features hydrate --target wasm32-unknown-unknown
      - name: Clippy (WebAssembly + SSR)
        run: cargo clippy --all-targets --features ssr --target wasm32-unknown-unknown

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
        with:
          toolchain: nightly
          components: rustfmt
      - run: cargo fmt --all --check

  machete:
    name: Machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
      - run: cargo machete

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
      - name: Install WebAssembly target
        run: rustup target add wasm32-unknown-unknown
      - name: Run unit tests
        run: mise run test:nextest
      - name: Run WebAssembly tests
        run: mise run test:wasm
